# Netlify configuration — OtterQuote (D-182)
# Production deploys from: main branch
# Staging deploys from: staging branch
#
# No build command needed — this is a static HTML site. Stripe publishable keys
# are committed directly per branch: pk_test_ on staging, pk_live_ on main.
# (Publishable keys are not secrets — they are visible in every browser request.)

[build]
  publish = "."

# Force UTF-8 charset on all HTML responses.
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Admin auth gate — W4-P1 (May 1, 2026)
[[edge_functions]]
  path = "/admin-*.html"
  function = "admin-auth-gate"
