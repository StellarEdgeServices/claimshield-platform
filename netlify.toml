# Netlify configuration — OtterQuote (D-182)
# Production deploys from: main branch
# Staging deploys from: staging branch
#
# The base [build] command is a no-op ("true") — this is required so Netlify
# enters a build step at all. Without a base command, Netlify treats the site
# as a static file upload and context-specific commands (like the staging
# Stripe key substitution below) never execute.

[build]
  publish = "."
  command = "true"

# Staging context — deploys to staging--jade-alpaca-b82b5e.netlify.app
# Substitutes pk_live_ with $STRIPE_PK_TEST before Netlify publishes files.
# Guard: if STRIPE_PK_TEST is unset, logs a warning and leaves pk_live_ intact
# rather than substituting with an empty string.
[context.staging]
  publish = "."
  command = "if [ -n \"$STRIPE_PK_TEST\" ]; then sed -i 's|pk_live_51TCI2O0AJRnqIYPU4ybaUmt2FRxihUu4kMKXvjnrvfsWRHyoi8ptkVuyKsDs3Zq4dMrGniPGg5BxtAmZfukah5aI00K31rnCbk|'\"$STRIPE_PK_TEST\"'|g' js/config.js && echo '[staging] Stripe publishable key substituted to test-mode'; else echo '[WARNING] STRIPE_PK_TEST not set — staging will use live publishable key'; fi"

# Production — explicit no-op so the base command does not accidentally run
# any staging logic on the main branch.
[context.production]
  publish = "."
  command = "true"

# Branch deploy previews (feature branches)
[context.deploy-preview]
  publish = "."

# Force UTF-8 charset on all HTML responses.
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Admin auth gate — W4-P1 (May 1, 2026)
[[edge_functions]]
  path = "/admin-*.html"
  function = "admin-auth-gate"
