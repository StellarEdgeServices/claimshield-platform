# D-232 (May 13, 2026): staging-mirror.yml
# One-way mirror: on every push to main, resets staging branch to
# match main HEAD. Branch protection on staging blocks direct commits;
# only this workflow may advance the staging ref.
#
# Prerequisites for this workflow to push to a protected staging branch:
#   GitHub Actions bot must be in the staging branch protection bypass list.
#   (Settings → Branches → staging rule → Bypass list → GitHub Actions)
name: Sync staging ← main

on:
  push:
    branches:
      - main
  workflow_dispatch:   # manual trigger for initial sync or recovery

permissions:
  contents: write

jobs:
  mirror:
    name: Reset staging to main HEAD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Sync staging ref to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Syncing staging → ${SHA:0:12}"
          gh api "repos/${{ github.repository }}/git/refs/heads/staging" \
            --method PATCH \
            --field sha="$SHA" \
            --field force=true
          echo "staging ← main sync complete."
