name: Playwright E2E Tests

on:
  push:
    branches:
      - staging
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint vanilla JS for syntax errors
        run: |
          echo "Running node --check on js/**/*.js ..."
          failed=0
          while IFS= read -r -d '' file; do
            if node --check "$file" 2>/tmp/node_check_err; then
              echo "PASS: $file"
            else
              echo "FAIL [parse-error]: $file"
              head -1 /tmp/node_check_err
              failed=1
            fi
          done < <(find js/ -name "*.js" -print0 2>/dev/null)
          if [ "$failed" -eq 1 ]; then
            echo "One or more JS files failed syntax check."
            exit 1
          fi
          echo "All js/ files passed syntax check."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'tests/e2e/package.json'

      - name: Install E2E test dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Seed test database
        working-directory: tests/e2e
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npm run seed

      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm test

      - name: Teardown test database
        if: always()
        working-directory: tests/e2e
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run teardown

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: tests/e2e/test-results/
          retention-days: 7
