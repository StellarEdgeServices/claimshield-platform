name: Schema Column Lint

on:
  push:
    branches: [staging, main]
    paths:
      - '**.html'
      - 'js/**.js'
      - 'supabase/functions/**'
      - 'sql/schema-snapshot.json'
      - 'scripts/schema-column-lint.py'
  pull_request:
    branches: [main]

jobs:
  schema-lint:
    name: Schema contract check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run schema column linter
        run: |
          python3 scripts/schema-column-lint.py \
            --root . \
            --schema sql/schema-snapshot.json

      # On main, fail hard. On other branches, warn-only so PRs can still merge
      # while the team works through the violation backlog.
      - name: Run schema column linter (warn-only for PRs to staging)
        if: failure() && github.base_ref == 'staging'
        run: |
          echo "::warning::Schema violations detected. Run 'python3 scripts/schema-column-lint.py' locally to see details."
          exit 0
