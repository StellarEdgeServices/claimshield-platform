name: Schema Column Lint

on:
  push:
    branches: [staging, main]
    paths:
      - '**.html'
      - 'js/**.js'
      - 'supabase/functions/**'
      - 'sql/schema-snapshot.json'
      - 'scripts/schema-column-lint.py'
  pull_request:
    branches: [main]

jobs:
  schema-lint:
    name: Schema contract check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FAIL-HARD MODE: All violations cleared in PR #148 (2026-05-26).
      # Any new FAIL line will block the PR. See ADR-010 for column contract rules.
      - name: Run schema column linter
        run: |
          python3 scripts/schema-column-lint.py \
            --root . \
            --schema sql/schema-snapshot.json
